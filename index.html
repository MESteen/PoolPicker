<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PoolPicker - Intro</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@300;400;500;600;700&family=Quicksand:wght@500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    height:100dvh;
    overflow:hidden;
}

/* Mobiel frame */

.phone{
    width:390px;
    height:844px;
    max-height:100vh;
    max-height:100dvh;
    border-radius:38px;
    overflow:hidden;
    position:relative;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
}

/* op echte telefoons het frame het volledige scherm laten vullen */

@media (max-width:430px){
    .phone{
        width:100vw;
        height:100vh;
        height:100dvh;
        max-height:none;
        border-radius:0;
        box-shadow:none;
    }
}

/* achtergrond, 90° gedraaid zodat de (liggende) foto de staande frame vult */

.bg{
    position:absolute;
    /* top:50%; */
    /* left:50%; */
    width:100%;
    height:100%;
    background:url("../PoolPicker/assets/pooltafel.png") center center/cover;
    /* transform:translate(-50%,-50%) rotate(90deg); */
    z-index:0;
}

/* donkere overlay */

.overlay{
    position:absolute;
    inset:0;
    z-index:1;
    background:linear-gradient(
        to bottom,
        rgba(0,0,0,.55),
        rgba(0,0,0,.70)
    );
}

.content{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    height:100%;
    padding:25px;
}

/* progress */

.progress{
    width:100%;
    margin-top:8px;
}

.progress-top{
    display:flex;
    justify-content:center;
    color:white;
    font-size:13px;
    margin-bottom:10px;
}

.progress-bar{
    width:100%;
    height:5px;
    background:rgba(255,255,255,.25);
    border-radius:20px;
}

.progress-fill{
    width:16%;
    height:100%;
    background:#ff4f83;
    border-radius:20px;
}

/* tekst */

.hero{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    text-align:center;
    color:white;
}

.hero h1{
    font-family:'Dancing Script',cursive;
    font-size:52px;
    font-weight:700;
    line-height:1.1;
}

.hero h1 span{
    color:#ff5c90;
}

.hero h1.challenge{
    margin:30px auto 0;
    max-width:80%;
    font-size:clamp(22px,7vw,34px);
    white-space:nowrap;
}

.hero p{
    margin-top:22px;
    line-height:1.7;
    font-size:15px;
    color:#efefef;
    font-weight:300;
    letter-spacing:.2px;
}

.hero strong{
    font-weight:600;
}

/* 8-ball */

.ball{
    margin:auto;
    width:165px;
    height:165px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#666,#111 70%);
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:
        inset -10px -15px 30px rgba(0,0,0,.6),
        0 15px 30px rgba(0,0,0,.45);
}

.circle{
    width:72px;
    height:72px;
    background:white;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
    font-weight:700;
}

/* button */

.btn{
    margin-top:auto;
    margin-bottom:10px;
    background:#ff4f83;
    color:white;
    border:none;
    border-radius:18px;
    height:64px;
    font-family:'Quicksand',sans-serif;
    font-size:19px;
    font-weight:500;
    letter-spacing:.4px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    cursor:pointer;
    transition:.25s;
}

.btn:hover{
    transform:translateY(-2px);
    background:#ff3b74;
}

a.btn{
    text-decoration:none;
}

</style>

</head>
<body>

<div class="phone">

    <div class="bg"></div>

    <div class="overlay"></div>

    <div class="content">

        <div class="progress">

            <div class="progress-top">
                1 van 6
            </div>

            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

        </div>

        <div class="hero">

            <h1>
                Hi Angel... <span>😊</span>
            </h1>

            <p>
                Het moment is eindelijk aangebroken
                <br>
                om te laten zien hoe goed
                <br>
                jij écht kan <strong>poolen.</strong>
                🎱
                <br><br>

                Tijd om erachter te komen
                <br>
                wie van ons beiden
                <br>
                de betere speler is...
            </p>

            <h1 class="challenge">
                ben jij er klaar voor?!
            </h1>

        </div>

        <a href="page2.html" class="btn">
            Ik durf het aan! <span>→</span>
        </a>

    </div>

</div>

</body>
</html>
